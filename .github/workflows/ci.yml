name: Kyro IDE CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint frontend
        run: bun run lint

      - name: Type-check frontend
        run: bun run type-check

      - name: Test frontend
        run: bun run test

      - name: Build frontend (exports out/)
        run: bun run build

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend (exports out/ for Tauri)
        run: bun run build

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets

      - name: Rust cargo check
        working-directory: src-tauri
        run: cargo check --workspace --locked

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --workspace --lib --tests

  build-matrix:
    name: Compile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
          - os: macos-14
          - os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: bun install

      - name: Build frontend (exports out/)
        run: bun run build

      - name: Compile Rust workspace
        working-directory: src-tauri
        run: cargo build --workspace --locked
